## @param replicaCount Number of Nginx replicas to deploy
replicaCount: 3

## Settings for NGINX image
##
## @param image.name Nginx image to use
## @param image.tag Nginx image tag to use
image:
  name: nginx
  tag: "1.31.2"

## NGINX container ports
##
## @param containerPorts.http
containerPorts:
  http: 80

## Settings for NGINX service
##
## @param service.enabled Whether to deploy service altogether or not
## @param service.type The type of service in front of Nginx pods
## @param service.port The port where the service is receiving requests
service:
  enabled: false
  type: ClusterIP
  port: 80