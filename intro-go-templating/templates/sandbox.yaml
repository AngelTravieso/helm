labels:
  {{- /* The app label comes from the Release */}}
  app: {{ .Release.Name }}
  {{- /* The chart label comes from the Chart information */}}
  chart: {{ .Chart.Name }}
  {{- if eq .Values.environment "production" }}
  environment: production
  build: stable
  public-ingress: true
  {{ else }}
  environment: dev
  build: alpha
  public-ingress: false
  {{ end }}